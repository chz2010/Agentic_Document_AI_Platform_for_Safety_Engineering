services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://safety:safety@postgres:5432/safety_platform
      PROJECT_CHROMA_PATH: /app/vectordb/project_docs
      UPLOADS_DIR: /app/data/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./vectordb:/app/vectordb
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: safety
      POSTGRES_PASSWORD: safety
      POSTGRES_DB: safety_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safety -d safety_platform"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  postgres_data:
